<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>俄罗斯方块 - Yopo</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/LLllCCC/tuchaung@main/img/my-avatar.jpg" />
    <link href="https://cdn.staticfile.net/remixicon/3.5.0/remixicon.css" rel="stylesheet" />
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="style.css?v=7" />
  </head>
  <body class="tetris-page">
    <div id="global-nav"></div>

    <main class="game-main">
      <div class="game-wrapper">
      <canvas id="game" width="240" height="400"></canvas>

      <div class="info-panel">
        <div class="score-box">
          <div class="score-title">SCORE</div>
          <div class="score-num" id="score">0</div>
        </div>

        <div class="score-box" id="next-box">
          <div class="score-title">NEXT</div>
          <canvas
            id="next"
            class="next-canvas"
            width="80"
            height="80"
          ></canvas>
        </div>

        <button class="btn-start" id="startBtn">
          开始
        </button>

        <div class="controls-tip">
          ← → 移动<br />↑ 旋转<br />↓ 加速<br />空格 暂停
        </div>
      </div>
    </div>

    <div class="mobile-controls">
      <div></div>
      <button class="m-btn" id="btn-up"><i class="ri-refresh-line"></i></button>
      <div></div>

      <button class="m-btn" id="btn-left">
        <i class="ri-arrow-left-line"></i>
      </button>
      <button class="m-btn" id="btn-down">
        <i class="ri-arrow-down-line"></i>
      </button>
    </div>
    </main>

    <script src="/config.js" defer></script>
    <script src="/nav.js" defer></script>
    <script src="/tetris.js" defer></script>
  </body>
</html>
