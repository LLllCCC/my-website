<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>俄罗斯方块 - Yopo</title>
    <link rel="icon" href="assets/my-avatar.jpg" />
    <link
      href="https://cdn.staticfile.net/remixicon/3.5.0/remixicon.css"
      rel="stylesheet"
    />
    <style>
      /* 全局样式：禁止页面滚动和缩放 */
      body {
        overflow: hidden;
        touch-action: none;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: "Courier New", monospace;
        user-select: none; /* 禁止选中文本 */
        -webkit-user-select: none;
      }

      .game-wrapper {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 20px;
        background: #2c2c2e;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      canvas#game {
        background: #000;
        display: block;
        border-radius: 4px;
        /* 关键修复：不要用 CSS 强行改变宽高，否则会模糊或变形 */
        width: 240px;
        height: 400px;
      }

      .info-panel {
        display: flex;
        flex-direction: column;
        gap: 15px;
        min-width: 90px;
      }

      .score-box {
        background: #3a3a3c;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
      }

      .score-title {
        font-size: 12px;
        color: #888;
        margin-bottom: 5px;
      }
      .score-num {
        font-size: 20px;
        font-weight: bold;
        color: #4cd964;
      }

      .btn-start {
        background: #0a84ff;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        width: 100%;
      }
      .btn-start:active {
        opacity: 0.8;
      }

      .controls-tip {
        font-size: 12px;
        color: #666;
        margin-top: auto;
        line-height: 1.5;
      }

      /* === 📱 手机端适配 === */
      .mobile-controls {
        display: none;
      } /* 默认隐藏 */

      @media (max-width: 600px) {
        .game-wrapper {
          flex-direction: column;
          align-items: center;
          gap: 10px;
          padding: 10px;
          background: transparent; /* 手机上去掉背景框，显得更轻量 */
          box-shadow: none;
        }

        .info-panel {
          flex-direction: row;
          justify-content: space-between;
          width: 240px; /* 和画布一样宽 */
          min-width: auto;
        }

        .score-box {
          flex: 1;
          padding: 5px;
        }
        #next-box {
          display: none;
        } /* 手机屏幕小，隐藏预览可能更好，或者保留 */
        .controls-tip {
          display: none;
        }
        .btn-start {
          width: auto;
          padding: 8px 20px;
        }

        /* 显示手机按钮 */
        .mobile-controls {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 15px;
          margin-top: 10px;
          width: 280px;
        }

        .m-btn {
          width: 70px;
          height: 70px;
          background: rgba(255, 255, 255, 0.15);
          border-radius: 50%;
          border: none;
          color: white;
          font-size: 28px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto;
          backdrop-filter: blur(5px);
          -webkit-tap-highlight-color: transparent; /* 去掉点击高亮 */
        }
        .m-btn:active {
          background: rgba(10, 132, 255, 0.6);
          transform: scale(0.95);
        }

        .return-link {
          position: absolute;
          top: 15px;
          left: 15px;
          color: rgba(255, 255, 255, 0.5);
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 5px;
          font-size: 14px;
          z-index: 10;
        }

        .next-canvas {
          background: transparent;
          margin: 0 auto;
        }

        /* 布局调整：上下左右 */
        #btn-up {
          grid-column: 2;
          background: rgba(255, 255, 255, 0.2);
        }
        #btn-left {
          grid-column: 1;
        }
        #btn-right {
          grid-column: 3;
        }
        #btn-down {
          grid-column: 2;
        }
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="return-link">
      <i class="ri-arrow-left-line"></i> 返回
    </a>

    <main class="game-main">
      <div class="game-wrapper">
      <canvas id="game" width="240" height="400"></canvas>

      <div class="info-panel">
        <div class="score-box">
          <div class="score-title">SCORE</div>
          <div class="score-num" id="score">0</div>
        </div>

        <div class="score-box" id="next-box">
          <div class="score-title">NEXT</div>
          <canvas
            id="next"
            class="next-canvas"
            width="80"
            height="80"
          ></canvas>
        </div>

        <button class="btn-start" id="startBtn">
          开始
        </button>

        <div class="controls-tip">
          ← → 移动<br />↑ 旋转<br />↓ 加速<br />空格 暂停
        </div>
      </div>
    </div>

    <div class="mobile-controls">
      <div></div>
      <button class="m-btn" id="btn-up"><i class="ri-refresh-line"></i></button>
      <div></div>

      <button class="m-btn" id="btn-left">
        <i class="ri-arrow-left-line"></i>
      </button>
      <button class="m-btn" id="btn-down">
        <i class="ri-arrow-down-line"></i>
      </button>
    </div>
    </main>

    <script src="/tetris.js"></script>
  </body>
</html>
