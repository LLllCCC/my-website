<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Yopo</title>
    <link rel="icon" href="assets/my-avatar.jpg" type="image/jpeg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="global-nav"></div>

    <main class="container blog-container">
        
        <div class="blog-header fade-in">
            <h1>思维碎片</h1>
            <p>记录代码旅程与生活点滴。</p>
        </div>

        <div class="search-container fade-in">
            <i class="ri-search-line search-icon" aria-hidden="true"></i>
            <input type="text" id="blog-search" class="search-input" placeholder="搜索文章标题或内容..." aria-label="搜索文章标题或内容">
        </div>

        <div class="article-list" id="dynamic-article-list">
            <p class="blog-empty-state" role="status" aria-live="polite">正在加载中... 🚀</p>
        </div>

        <div id="global-footer"></div>
        <script src="/footer.js"></script>
    </main>

    <script src="/nav.js"></script>
    <script src="main.js"></script>

    <script src="/blog.js"></script>
</body>
</html>
