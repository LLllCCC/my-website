<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Yopo - 秘密发布后台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  </head>
<body class="admin-page">
    <main class="admin-main">
      <form id="admin-form" class="admin-box" novalidate>
          <h2>🚀 发布新文章</h2>
          <label for="title" class="sr-only">文章标题</label>
          <input type="text" id="title" placeholder="文章标题" required>
          <label for="tags" class="sr-only">标签</label>
          <input type="text" id="tags" placeholder="标签 (用逗号隔开)">
          <label for="cover" class="sr-only">封面图链接</label>
          <input type="text" id="cover" placeholder="封面图链接 (assets/...)">
          <label for="markdown-editor" class="sr-only">文章内容</label>
          <textarea id="markdown-editor"></textarea>
          <label for="admin-token" class="sr-only">发布口令</label>
          <input type="password" id="admin-token" placeholder="输入发布口令" required>
          <button type="submit" id="publish-button">立即发布到服务器</button>
      </form>

      <hr class="admin-divider">

    <div class="admin-list-section">
        <h2 class="admin-section-title">📂 文章管理</h2>
        <div id="admin-post-list" role="status" aria-live="polite">
            <p class="admin-placeholder">正在加载文章列表...</p>
        </div>
    </div>
    </main>
    
    <script src="/admin.js" defer></script>

</body>
</html>
